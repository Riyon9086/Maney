<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Maney</title>
  <!-- === link to file-->
  <link rel="icon" type="image/svg+xml" href="./src/svg/favicon.svg">
  <link rel="stylesheet" href="./aset/css/dash.css">
  
  <!-- === Icon fontawesome-->
  <script src="https://kit.fontawesome.com/8f1b7a69f3.js" crossorigin="anonymous"></script>
  
  <!-- === Import Font-->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app">

    <div class="header">
      <button onclick="history.back()"><i class="fa-solid fa-angle-left"></i></button>
      <div>Dashboard</div>
      <div></div>
    </div>

    <div class="balance-card">
      <p>Saldo</p>
      <h1 id="totalSaldo">Rp0</h1>

      <div class="balance-detail">
        <div>
          <span>Pemasukan</span>
          <h3 id="totalIncome">Rp0</h3>
        </div>
        <div>
          <span>Pengeluaran</span>
          <h3 id="totalExpense">Rp0</h3>
        </div>
      </div>
      <div class="balance-actions">
  <button class="action-pill" id="exportBtn">
    <i class="fa-solid fa-arrow-down"></i>
    <span>Export</span>
  </button>

  <button class="action-pill" id="importBtn">
    <i class="fa-solid fa-arrow-up"></i>
    <span>Import</span>
  </button>
</div>

<input type="file" id="importFile" hidden>
    </div>

    <div class="menu">
      <div class="menu-item">💸</div>
      <div class="menu-item">📊</div>
      <div class="menu-item">🧾</div>
      <div class="menu-item">⚙️</div>
    </div>

    <div class="history">
      <h3>Transaksi Terakhir</h3>
      <div id="historyList"></div>
    </div>

  </div>
  
<div id="alert">
      <div class="alert-container">
          <i class="warning fa-solid fa-triangle-exclamation"></i>
          <b class="alert-text">Delete Transaksi</b>
          <span class="alert-desc">Anda yakin ingin menghapus Transaksi ini?</span>
          <div class="alert-button">
            <button id="cancel" onclick="deleteAlert()">Batal</button>
            <button id="yess" onclick="confirmDelete()">Yes</button>
          </div>
      </div>
    </div>

  <script src="./aset/js/dash.js"></script>
</body>
</html>
